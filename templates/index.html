<!DOCTYPE html>
<html>
<head>
    <title>Learning Path Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Learning Path Generator</h2>

    <form action="/generate" method="POST">
        <input type="text" name="goal" placeholder="Enter your career goal" required>
        <button type="submit">Generate Path</button>
    </form>

    <a href="/history">View History</a>
</div>

</body>
</html>
